<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="HABIT — Criar uma nova conta.">
  <title>HABIT — Criar Conta</title>
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components/header.css">
  <link rel="stylesheet" href="../css/components/footer.css">
  <link rel="stylesheet" href="../css/components/button.css">
  <link rel="stylesheet" href="../css/components/form.css">
  <link rel="stylesheet" href="../css/pages/auth.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Pular para o conteúdo</a>

  <header class="appbar">
    <div class="container appbar__inner">
      <div class="appbar__brand-row">
        <a href="../index.html" class="brand" aria-label="HABIT — Início">HABIT</a>
        <span class="nav-toggle">
          <input id="nav-toggle" class="nav-toggle__checkbox" type="checkbox" aria-label="Abrir menu de navegação">
          <label for="nav-toggle" class="nav-toggle__label" aria-hidden="true"><span class="nav-toggle__icon"></span></label>
        </span>
      </div>
      <nav aria-label="Principal">
        <ul class="nav-menu" role="list">
          <li><a href="../index.html">Início</a></li>
          <li><a href="destaques.html">Páginas</a></li>
          <li><a href="destaques.html">Destaques</a></li>
          <li><a href="newsletter.html">Assinar</a></li>
          <li><a href="admin-categorias.html">Admin</a></li>
        </ul>
      </nav>
      <form class="appbar__search" action="busca.html" method="get" role="search">
        <label for="q" class="sr-only">Buscar</label>
        <div class="appbar__search-row">
          <input id="q" name="q" type="search" placeholder="Buscar...">
          <div class="appbar__actions">
            <button type="submit" class="btn btn--outline btn--sm">Buscar</button>
            <a href="entrar.html" class="btn btn--outline btn--sm">Entrar</a>
          </div>
        </div>
      </form>
    </div>
  </header>

  <main id="main-content" class="container">
    <section class="auth" aria-labelledby="cad-title">
      <div class="auth__card form-card">
        <h1 id="cad-title" class="auth__title">Criar Conta</h1>
        <form class="form" action="#" method="post">
          <div class="form__field">
            <label class="form__label" for="nome">Nome completo</label>
            <input id="nome" class="form__input" type="text" name="nome" required autocomplete="name">
          </div>
          <div class="form__field">
            <label class="form__label" for="email">E-mail</label>
            <input id="email" class="form__input" type="email" name="email" required autocomplete="email">
          </div>
          <div class="form__field">
            <label class="form__label" for="senha">Senha</label>
            <input id="senha" class="form__input" type="password" name="senha" required autocomplete="new-password">
          </div>
          <div class="form__field">
            <label class="form__label" for="senha2">Confirmar senha</label>
            <input id="senha2" class="form__input" type="password" name="senha2" required autocomplete="new-password">
          </div>
          <div class="form__check">
            <input id="terms" type="checkbox" name="terms" required>
            <label for="terms">Concordo com os termos e a política de privacidade</label>
          </div>
          <div class="form__actions">
            <button type="submit" class="btn btn--primary">Cadastrar</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <nav aria-label="Rodapé">
        <ul class="site-footer__links" role="list">
          <li><a href="#" aria-label="Instagram">Instagram</a></li>
          <li><a href="#" aria-label="Categoria Work">Work</a></li>
          <li><a href="#" aria-label="Categoria Bags">Bags</a></li>
          <li><a href="#" aria-label="Categoria Lamp">Lamp</a></li>
          <li><a href="#" aria-label="Categoria Books">Books</a></li>
        </ul>
      </nav>
      <p class="site-footer__copy">© 2025 Meu Site • HABIT</p>
    </div>
  </footer>
</body>
</html>
